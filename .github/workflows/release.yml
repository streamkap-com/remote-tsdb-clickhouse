name: Build and publish image

# Manual release. Operator creates a git tag (e.g. v0.1.3) and runs this
# workflow with that tag as input. The image is built from the tagged commit
# and pushed to ECR with the same tag. Chart values bump is done by hand.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (must already exist). Used verbatim as the ECR image tag. Example: v0.1.3"
        required: true
        type: string

env:
  ECR_REGISTRY: 003675007768.dkr.ecr.us-west-2.amazonaws.com
  AWS_REGION: us-west-2
  AWS_ROLE_ARN: arn:aws:iam::003675007768:role/StreamkapCIRole
  IMAGE_NAME: remote-tsdb-clickhouse

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC -> AWS role assumption
      contents: read
    steps:
      - name: Validate tag
        run: |
          tag="${{ github.event.inputs.tag }}"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag must be vMAJOR.MINOR.PATCH[-suffix] (got '$tag')"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          docker build --push \
            -t "${ECR_REGISTRY}/${IMAGE_NAME}:${{ github.event.inputs.tag }}" \
            -f Dockerfile \
            .
